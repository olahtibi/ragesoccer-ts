<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>RageSoccer</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body class="game-page">
    <div id="rotateNotice">Rotate your phone to landscape</div>
    <img
      id="pitch"
      class="preloaded-asset"
      src="assets/images/pitch-v2.png"
      alt=""
    />
    <img
      id="ball"
      class="preloaded-asset"
      src="assets/images/ball-v4.png"
      alt=""
    />
    <img
      id="player-home"
      class="preloaded-asset"
      src="assets/images/soccer_player_for_arcade_style/sprite-map-home.png"
      alt=""
    />
    <img
      id="player-away"
      class="preloaded-asset"
      src="assets/images/soccer_player_for_arcade_style/sprite-map-away.png"
      alt=""
    />
    <canvas id="myCanvas" width="640" height="480"></canvas>
  </body>
</html>
